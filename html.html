
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact Form</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      --bg: #f7f9fc;
      --card: #ffffff;
      --accent: #2563eb;
      --muted: #6b7280;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 32px;
      color: #111827;
    }
    .card {
      background: var(--card);
      padding: 22px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(16,24,40,0.08);
      width: 100%;
      max-width: 460px;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 20px;
    }
    p.lead {
      margin: 0 0 18px 0;
      color: var(--muted);
      font-size: 13px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #e6e9ef;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.08);
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
    button {
      background: var(--accent);
      color: white;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .result {
      margin-top: 14px;
      font-size: 14px;
      color: #065f46;
      background: #ecfdf5;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #bbf7d0;
    }
    .error {
      color: #b91c1c;
      font-size: 13px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Contact details</h1>
    <p class="lead">Enter your name, Gmail address and mobile number.</p>

    <form id="contactForm" novalidate>
      <div class="field">
        <label for="name">Full name</label>
        <input id="name" name="name" type="text" placeholder="e.g. Ujjawal Birla" required minlength="2" />
        <div class="error" id="nameError" aria-live="polite"></div>
      </div>

      <div class="field">
        <label for="email">Gmail address</label>
        <input id="email" name="email" type="email" placeholder="example@gmail.com" required
               pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$" />
        <div class="hint">Only Gmail addresses are accepted (must end with <code>@gmail.com</code>).</div>
        <div class="error" id="emailError" aria-live="polite"></div>
      </div>

      <div class="field">
        <label for="mobile">Mobile number</label>
        <input id="mobile" name="mobile" type="tel" placeholder="1234567890" required
               pattern="^\d{7,15}$" />
        <div class="hint">Digits only. Between 7 and 15 digits (international-friendly).</div>
        <div class="error" id="mobileError" aria-live="polite"></div>
      </div>

      <div style="display:flex;gap:8px;align-items:center">
        <button type="submit">Submit</button>
        <button id="resetBtn" type="button" style="background:#ef4444">Reset</button>
      </div>
